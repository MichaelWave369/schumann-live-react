<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">EIRM Logo Mark</title>
  <desc id="desc">Earth, ionosphere rings, and resonance waveform.</desc>
  <rect width="120" height="120" rx="28" fill="#050715"/>
  <defs>
    <linearGradient id="ringGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="60" cy="60" r="18" fill="rgba(34,211,238,0.24)" stroke="#22d3ee" stroke-width="3" filter="url(#glow)"/>
  <ellipse cx="60" cy="60" rx="44" ry="18" fill="none" stroke="url(#ringGradient)" stroke-width="3" opacity="0.86"/>
  <ellipse cx="60" cy="60" rx="44" ry="18" fill="none" stroke="url(#ringGradient)" stroke-width="3" opacity="0.66" transform="rotate(62 60 60)"/>
  <ellipse cx="60" cy="60" rx="44" ry="18" fill="none" stroke="url(#ringGradient)" stroke-width="3" opacity="0.66" transform="rotate(-62 60 60)"/>
  <path d="M18 82 C30 68, 42 96, 54 82 S78 68, 90 82 S108 96, 116 82" fill="none" stroke="#86efac" stroke-width="4" stroke-linecap="round"/>
</svg>
